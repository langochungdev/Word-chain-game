<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #c8c8c8;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(11px, 1.6vw, 14px);
            overflow: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            background: repeating-linear-gradient(to bottom,
                    transparent 0px, transparent 2px,
                    rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
        }

        #screen {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: clamp(1.2rem, 4vw, 3rem) clamp(1.2rem, 5vw, 5rem);
            max-width: 820px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: clamp(1.5rem, 4vh, 3rem);
            opacity: 0;
            animation: fadein 0.3s 0.1s forwards;
            flex-shrink: 0;
        }

        .dot-r {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3a3a3a;
            flex-shrink: 0;
        }

        .dot-r:nth-child(1) {
            background: #ff5f57;
        }

        .dot-r:nth-child(2) {
            background: #febc2e;
        }

        .dot-r:nth-child(3) {
            background: #28c840;
        }

        .bar-title {
            margin-left: auto;
            font-size: 0.72em;
            color: #333;
            letter-spacing: 0.08em;
        }

        #output {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .line {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            line-height: 1.85;
            opacity: 0;
            animation: fadein 0.12s forwards;
            flex-shrink: 0;
        }

        .prompt {
            color: #2e2e2e;
            flex-shrink: 0;
            user-select: none;
        }

        .cmd {
            color: #e0e0e0;
        }

        .out {
            color: #484848;
            padding-left: 1.2rem;
        }

        .ok {
            color: #28c840;
            padding-left: 1.2rem;
        }

        .warn {
            color: #febc2e;
            padding-left: 1.2rem;
        }

        .err {
            color: #ff5f57;
            padding-left: 1.2rem;
        }

        .hi {
            color: #ffffff;
            padding-left: 1.2rem;
            font-weight: 700;
        }

        .blank {
            line-height: 0.9;
        }

        #cursor-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.85;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .caret {
            display: inline-block;
            width: 7px;
            height: 1.05em;
            background: #c8c8c8;
            animation: blink 1.1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .bottom {
            flex-shrink: 0;
            margin-top: clamp(1rem, 3vh, 2rem);
            display: flex;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .status-text,
        .uptime {
            color: #222;
            font-size: 0.68em;
            letter-spacing: 0.1em;
        }

        @keyframes fadein {
            to {
                opacity: 1;
            }
        }

        /* ── HERO HEADER ── */
        #hero {
            flex-shrink: 0;
            margin-bottom: clamp(1.2rem, 3vh, 2.2rem);
            opacity: 0;
            animation: fadein 0.6s 0.3s forwards;
        }

        .hero-label {
            font-size: 0.68em;
            color: #febc2e;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .hero-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }

        /* shimmer sweep on title */
        .hero-title::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.07) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .hero-sub {
            font-size: 0.78em;
            color: #3a3a3a;
            letter-spacing: 0.04em;
            margin-top: 0.3rem;
        }

        .hero-divider {
            margin-top: clamp(0.8rem, 2vh, 1.4rem);
            height: 1px;
            background: linear-gradient(90deg, #1e1e1e, #2a2a2a 40%, transparent);
        }

        /* ── CURSOR RIPPLE CANVAS ── */
        #ripple-canvas {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <canvas id="ripple-canvas"></canvas>
    <div id="screen">

        <div class="top-bar">
            <div class="dot-r"></div>
            <div class="dot-r"></div>
            <div class="dot-r"></div>
            <span class="bar-title">maintenance@prod — bash</span>
        </div>

        <!-- Hero: người dùng thường nhìn hiểu ngay -->
        <div id="hero">
            <div class="hero-label">⚙ Thông báo hệ thống</div>
            <div class="hero-title">Trang web đang bảo trì</div>
            <div class="hero-sub">Chúng tôi đang nâng cấp. Vui lòng quay lại sau ít phút.</div>
            <div class="hero-divider"></div>
        </div>

        <div id="output"></div>

        <div id="cursor-line">
            <span class="prompt">$</span>
            <span class="caret"></span>
        </div>

        <div class="bottom" id="bottom">
            <span class="status-text">MAINTENANCE MODE · v2.1.0</span>
            <span id="uptime"></span>
        </div>

    </div>
    <script>
        // ── CURSOR RIPPLE ──
        (function () {
            const canvas = document.getElementById('ripple-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            let ripples = [];
            let mouse = { x: -999, y: -999 };
            let lastX = -999, lastY = -999;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            document.addEventListener('mousemove', e => {
                const dx = e.clientX - lastX, dy = e.clientY - lastY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                mouse.x = e.clientX; mouse.y = e.clientY;
                // spawn ripple every ~18px of movement
                if (dist > 18) {
                    ripples.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 28 + Math.random() * 18, alpha: 0.22, speed: 1.4 + Math.random() });
                    lastX = e.clientX; lastY = e.clientY;
                }
            });

            // also spawn on click
            document.addEventListener('click', e => {
                for (let i = 0; i < 3; i++) {
                    ripples.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 50 + i * 22, alpha: 0.18, speed: 1.2 + i * 0.4 });
                }
            });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                ripples = ripples.filter(r => r.alpha > 0.005);
                for (const r of ripples) {
                    r.r += r.speed;
                    r.alpha *= 0.93;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,255,255,${r.alpha})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ── TERMINAL LOGS ──
        const output = document.getElementById('output');
        const cursorLine = document.getElementById('cursor-line');

        // [delay_ms, type, text]
        const SCRIPT = [
            [0, 'cmd', 'sudo systemctl stop app.service'],
            [700, 'ok', '● app.service stopped'],
            [1100, 'blank', ''],
            [1200, 'cmd', 'pg_dump -U postgres maindb > /backup/db_20250315.sql'],
            [2000, 'out', 'connecting to database...'],
            [2600, 'out', 'exporting 1,842 tables...'],
            [3600, 'ok', 'backup complete  [312 MB]'],
            [4000, 'blank', ''],
            [4100, 'cmd', 'git pull origin main && npm run build'],
            [4800, 'out', 'remote: Enumerating objects: 47, done.'],
            [5400, 'out', 'Unpacking objects: 100% (47/47), done.'],
            [5900, 'out', 'building...  [0/4]'],
            [6500, 'out', 'building...  [2/4]'],
            [7200, 'out', 'building...  [4/4]'],
            [7800, 'ok', 'build successful  (12.4s)'],
            [8200, 'blank', ''],
            [8300, 'cmd', 'node scripts/migrate.js --env production'],
            [9000, 'out', 'checking database connection...  OK'],
            [9500, 'out', 'running 001_add_indexes...  OK'],
            [10100, 'out', 'running 002_update_schema...  OK'],
            [10700, 'ok', 'all migrations done'],
            [11100, 'blank', ''],
            [11200, 'cmd', 'redis-cli FLUSHALL'],
            [11800, 'ok', 'OK  (cache cleared)'],
            [12200, 'blank', ''],
            [12300, 'cmd', 'curl -s https://cdn.example.com/purge --data @zones.json'],
            [13000, 'warn', '⚠  zone AS-02 timeout — retrying...'],
            [13800, 'ok', 'CDN purge complete  (1/1 zones)'],
            [14200, 'blank', ''],
            [14300, 'cmd', 'nginx -t && systemctl reload nginx'],
            [14900, 'ok', 'nginx: configuration file syntax is ok'],
            [15400, 'ok', 'nginx: reloaded'],
            [15800, 'blank', ''],
            [15900, 'cmd', 'sudo systemctl start app.service'],
            [16600, 'ok', '● app.service started  (PID 4821)'],
            [17100, 'blank', ''],
            [17200, 'cmd', 'curl -s localhost:3000/health | jq'],
            [17900, 'out', '{'],
            [18050, 'out', '  "status": "ok",'],
            [18150, 'out', '  "db": "connected",'],
            [18250, 'out', '  "cache": "connected"'],
            [18350, 'out', '}'],
            [18800, 'blank', ''],
            [18900, 'hi', '✓  system healthy. maintenance complete.'],
        ];

        let maxDelay = 0;

        SCRIPT.forEach(([delay, type, text]) => {
            if (delay > maxDelay) maxDelay = delay;
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'line';
                if (type === 'blank') {
                    div.classList.add('blank');
                    div.innerHTML = '&nbsp;';
                } else if (type === 'cmd') {
                    div.innerHTML = `<span class="prompt">$</span><span class="cmd">${text}</span>`;
                } else {
                    div.innerHTML = `<span class="${type}">${text}</span>`;
                }
                output.appendChild(div);
                output.scrollTop = output.scrollHeight;
            }, delay);
        });

        setTimeout(() => { cursorLine.style.opacity = '1'; }, maxDelay + 400);
        setTimeout(() => { document.getElementById('bottom').style.opacity = '1'; }, maxDelay + 300);

        // uptime counter
        (function () {
            const el = document.getElementById('uptime');
            let s = 0;
            const p = n => String(n).padStart(2, '0');
            setInterval(() => {
                s++;
                el.textContent = `uptime ${p(Math.floor(s / 3600))}:${p(Math.floor(s % 3600 / 60))}:${p(s % 60)}`;
            }, 1000);
        })();
    </script>
</body>

</html>
