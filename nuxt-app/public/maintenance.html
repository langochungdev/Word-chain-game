<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>He thong dang cap nhat</title>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #071625;
            --bg-2: #113c5e;
            --card: rgba(255, 255, 255, 0.92);
            --text: #142433;
            --muted: #49657e;
            --accent: #ff7f3f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1000px 600px at 80% -10%, rgba(255, 194, 140, 0.3), transparent 65%),
                linear-gradient(120deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(620px, 100%);
            background: var(--card);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: #ffe6d8;
            color: #9a3f0d;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 14px 0 10px;
            font-size: clamp(1.6rem, 3.3vw, 2.2rem);
            line-height: 1.2;
        }

        p {
            margin: 0;
            font-size: 1.03rem;
            line-height: 1.65;
            color: var(--muted);
        }

        .footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px dashed rgba(20, 36, 51, 0.2);
            font-size: 0.95rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--accent);
            display: inline-block;
            margin-right: 8px;
            animation: pulse 1.2s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(0.68);
                opacity: 0.45;
            }
        }
    </style>
</head>

<body>
    <main class="card" role="main" aria-labelledby="maint-title">
        <span class="badge">Thong bao he thong</span>
        <h1 id="maint-title">Du an dang cap nhat, vui long doi trong it phut</h1>
        <p>
            Chung toi dang nang cap he thong de tang do on dinh va hieu nang.
            Trong thoi gian nay, mot so tinh nang tam thoi khong kha dung.
        </p>
        <div class="footer">
            <span class="dot" aria-hidden="true"></span>
            Trang se mo lai ngay sau khi cap nhat hoan tat.
        </div>
    </main>
</body>

</html>
